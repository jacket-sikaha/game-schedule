name: Deploy Frontend to Cloudflare Pages

on:
  push:
    branches: [main]
    paths:
      - "apps/web-frontend/**"
      - ".github/workflows/publish.yml"
      - "package.json"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      # 最小权限原则：只授予必要的权限
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          # 指定 node 版本缓存，避免重复下载
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v3 # 升级到最新稳定版
        with:
          version: 8
          # 启用 pnpm 内置的 store 缓存
          run_install: false

      - name: Get pnpm cache directory path
        id: pnpm-cache-dir-path
        run: echo "dir=$(pnpm config get cacheFolder)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies (核心缓存步骤)
        uses: actions/cache@v4
        with:
          path: |
            ~/.pnpm-store       # pnpm 全局存储（所有项目共享）
            **/node_modules     # 当前项目的依赖目录
            ~/.cache/node-gyp   # 可选：缓存 node-gyp 编译产物
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile # 锁定依赖版本，避免意外更新

      - name: Build frontend
        run: pnpm build:frontend

      # Run a build step here if your project requires
      - name: Cloudflare Pages GitHub Action
        uses: cloudflare/pages-action@v1.5.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: gameevent-frontend
          directory: ./apps/web-frontend/dist

          # Optional: Enable this if you want to have GitHub Deployments triggered
          # 该token每个工作流作业开始时，GitHub 会自动创建唯一的 GITHUB_TOKEN 机密以在工作流中使用，直接使用无需额外设置机密变量
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          # Optional: Switch what branch you are publishing to.
          # By default this will be the branch which triggered this workflow
          branch: main
          # Optional: Change the working directory
          # workingDirectory: ./dist
          # Optional: Change the Wrangler version, allows you to point to a specific version or a tag such as `beta`
          wranglerVersion: "3"
