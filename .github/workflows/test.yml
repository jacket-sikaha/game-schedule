name: Test

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    # Node 版本矩阵——如果只想测当前版本，删掉 strategy 整段
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      # 1. 拉代码
      - uses: actions/checkout@v4

      # 2. 安装 pnpm（版本取自 package.json 的 packageManager 字段）
      - uses: pnpm/action-setup@v4

      # 3. 安装 Node
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'pnpm'

      # 4. 安装依赖（--frozen-lockfile 确保锁文件一致性，monorepo 全局只有根目录一个锁文件）
      - run: pnpm install --frozen-lockfile

      # 5. 运行测试 + 覆盖率
      #    -- 后面的 --coverage 传递给 vitest
      #    CI=true 时 vitest 自动：启用重试、生成 JUnit 报告
      - run: pnpm test -- --coverage
        env:
          CI: true

      # 5.5 调试：列出覆盖率文件位置
      - run: |
          ls

      # 6. 上传覆盖率报告（即使测试失败也上传，方便排查）
      #    覆盖率输出在子项目目录下：apps/cloudflare-backend/coverage/
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          # 工件名称（自定义，方便下载区分）
          name: coverage-report-node-${{ matrix.node-version }}
          # 核心：直接写 目录路径 即可上传整个目录
          path: ./apps/cloudflare-backend/coverage/
          retention-days: 7
